  .header{background:linear-gradient(180deg,rgba(244,60,226,0.06) 0%,transparent 100%);border-bottom:1px solid var(--card-border);padding:20px 40px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);}
  .logo-area{display:flex;align-items:center;gap:18px;}
  .logo-svg{height:44px;width:auto;object-fit:contain;}
  .logo-divider{width:1px;height:36px;background:rgba(255,255,255,0.1);}
  .logo-text{display:flex;flex-direction:column;}
  .logo-text span:first-child{font-size:15px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text);}
  .logo-text span:last-child{font-size:11px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;font-family:var(--font-body);}
  .header-right{display:flex;align-items:center;gap:16px;}
  .header-date{font-size:13px;color:var(--text-dim);}
  .header-badge{background:var(--pink-dim);color:var(--pink);font-size:11px;font-weight:600;padding:6px 16px;border-radius:50px;border:1px solid rgba(244,60,226,0.2);letter-spacing:1px;text-transform:uppercase;font-family:var(--font-heading);}

  /* NAV TABS */
  .nav-tabs{display:flex;gap:6px;padding:14px 40px;border-bottom:1px solid var(--card-border);background:rgba(11,11,18,0.9);backdrop-filter:blur(12px);position:sticky;top:85px;z-index:99;}
  .nav-tab{padding:10px 24px;font-size:12px;font-weight:600;color:var(--text-dim);background:transparent;border:1px solid var(--card-border);border-radius:50px;cursor:pointer;transition:all 0.25s;letter-spacing:0.8px;text-transform:uppercase;}
  .nav-tab:hover{color:var(--text-mid);background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.12);}
  .nav-tab.active{color:#000;background:var(--pink);border-color:var(--pink);font-weight:700;}

  /* LOCATION TABS */
  .loc-tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;}
  .loc-tab{padding:8px 20px;font-size:11px;font-weight:600;color:var(--text-dim);background:transparent;border:1px solid var(--card-border);border-radius:50px;cursor:pointer;transition:all 0.25s;letter-spacing:0.6px;text-transform:uppercase;}
  .loc-tab:hover{color:var(--text-mid);background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.12);}
  .loc-tab.active{color:#000;font-weight:700;}

  /* MONTH TABS */
  .month-tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;}
  .month-tab{padding:7px 18px;font-size:10px;font-weight:600;color:var(--text-dim);background:transparent;border:1px solid var(--card-border);border-radius:50px;cursor:pointer;transition:all 0.25s;letter-spacing:0.6px;text-transform:uppercase;font-family:var(--font-heading);}
  .month-tab:hover{color:var(--text-mid);background:rgba(255,255,255,0.04);}
  .month-tab.active{color:#000;background:var(--pink);border-color:var(--pink);font-weight:700;}

  .main{padding:28px 40px 60px;max-width:1480px;margin:0 auto;}
  .section-label{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);margin-bottom:16px;margin-top:8px;display:flex;align-items:center;gap:14px;}
  .section-label::after{content:'';flex:1;height:1px;background:var(--card-border);}

  /* METRIC CARDS */
  .metrics-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:32px;}
  .metrics-row-4{grid-template-columns:repeat(4,1fr);}
  .metric-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:24px;transition:all 0.3s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;backdrop-filter:blur(10px);}
  .metric-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--pink),rgba(244,60,226,0.3));opacity:0;transition:opacity 0.3s;}
  .metric-card:hover{background:var(--card-hover);border-color:rgba(244,60,226,0.15);transform:translateY(-3px);box-shadow:0 12px 40px rgba(244,60,226,0.08);}
  .metric-card:hover::before{opacity:1;}
  .metric-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:16px;}
  .metric-label{font-size:11px;color:var(--text-dim);margin-bottom:8px;font-weight:500;letter-spacing:0.8px;text-transform:uppercase;font-family:var(--font-body);}
  .metric-value{font-size:28px;font-weight:700;color:var(--text);letter-spacing:-1px;line-height:1.1;}
  .metric-change{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;margin-top:10px;padding:4px 10px;border-radius:50px;font-family:var(--font-body);}
  .metric-change.up{color:var(--green);background:rgba(0,230,118,0.1);}
  .metric-change.down{color:var(--red);background:rgba(255,82,82,0.1);}
  .metric-change.neutral{color:var(--text-dim);background:rgba(255,255,255,0.05);}

  /* LOCATION CARDS */

  .loc-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:22px;transition:all 0.3s cubic-bezier(.4,0,.2,1);backdrop-filter:blur(10px);position:relative;overflow:hidden;}
  .loc-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;opacity:0.8;}
  .loc-card:hover{background:var(--card-hover);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,0.2);}
  .loc-card-header{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--card-border);}
  .loc-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .loc-card-name{font-size:13px;font-weight:700;font-family:var(--font-heading);letter-spacing:0.5px;}
  .loc-card-city{font-size:10px;color:var(--text-dim);letter-spacing:0.5px;margin-left:auto;}
  .loc-stat{margin-bottom:14px;}
  .loc-stat:last-child{margin-bottom:0;}
  .loc-stat-label{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;font-family:var(--font-body);}
  .loc-stat-value{font-size:20px;font-weight:700;letter-spacing:-0.5px;font-family:var(--font-heading);}
  .loc-stat-sub{font-size:10px;font-weight:600;margin-top:2px;font-family:var(--font-body);}

  .platform-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:26px;transition:all 0.3s cubic-bezier(.4,0,.2,1);backdrop-filter:blur(10px);}

  .platform-name{display:flex;align-items:center;gap:10px;}

  .chart-title{font-size:14px;font-weight:700;letter-spacing:0.3px;}

  .audience-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:20px;text-align:center;backdrop-filter:blur(10px);}
  .audience-card-name{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;font-family:var(--font-heading);}

  .audience-row-label{color:var(--text-dim);}
  .audience-row-value{color:var(--text);font-weight:600;}

  .table-wrapper{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;}
  thead th{text-align:left;font-size:10px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;padding:12px 16px;border-bottom:1px solid var(--card-border);font-family:var(--font-heading);}
  tbody td{padding:14px 16px;font-size:13px;color:var(--text-mid);border-bottom:1px solid rgba(255,255,255,0.03);}
  tbody tr:hover{background:rgba(255,255,255,0.02);}
  tbody tr:last-child td{border-bottom:none;}

  /* FOOTER */
  .footer{border-top:1px solid var(--card-border);padding:24px 40px;display:flex;align-items:center;justify-content:space-between;}
  .footer-left{font-size:12px;color:var(--text-dim);}
  .footer-brand{font-size:12px;color:var(--text-dim);display:flex;align-items:center;gap:8px;}
  .footer-brand a{color:var(--pink);text-decoration:none;font-weight:600;}

  .section{display:none;}
  .section.active{display:block;}

  /* highlight best metric in green */
  .best{color:var(--green) !important;}

  @media(max-width:1200px){.loc-grid,.metrics-row,.audience-grid{grid-template-columns:repeat(3,1fr);}.charts-grid{grid-template-columns:1fr;}}
  @media(max-width:768px){.loc-grid,.metrics-row,.audience-grid{grid-template-columns:repeat(2,1fr);}.main{padding:20px;}.header{padding:16px 20px;}.nav-tabs{padding:12px 20px;overflow-x:auto;}.insights-grid{grid-template-columns:1fr;}}
  @media(max-width:500px){.loc-grid,.metrics-row,.audience-grid{grid-template-columns:1fr;}.header-right{display:none;}}
  @media(max-width:600px){.footer{flex-direction:column;text-align:center;gap:6px;padding:18px 20px;}}
</style>

// === DATE ===
document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

// === HELPERS ===
function totalMetric(month, key) {
  const m = DATA[month];
  if (!m) return 0;
  return LOCATIONS.reduce((sum,loc) => sum + (m[loc.id] ? m[loc.id][key] || 0 : 0), 0);
}
function formatNum(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return (n/1000).toFixed(1)+'K';
  return n.toString();
}
function bestLoc(month, key) {
  const m = DATA[month];
  if (!m) return '';
  let best = '', bestVal = -1;
  LOCATIONS.forEach(loc => { if (m[loc.id] && m[loc.id][key] > bestVal) { bestVal = m[loc.id][key]; best = loc.id; } });
  return best;
}

// === RENDER ===
function render() {
  const main = document.getElementById('mainContent');
  const md = DATA[currentMonth];
  const monthLabel = MONTHS.find(m=>m.id===currentMonth)?.label || currentMonth;

  // Month selector HTML
  const monthHTML = `<div class="month-tabs">${MONTHS.map(m =>
    `<button class="month-tab ${m.id===currentMonth?'active':''}" onclick="setMonth('${m.id}',this)">${m.label}</button>`
  ).join('')}</div>`;

  if (currentTab === 'overview') {
    const totalReach = md ? totalMetric(currentMonth,'reachNum') : 0;
    const totalInt = md ? totalMetric(currentMonth,'intNum') : 0;
    const totalFollowers = md ? totalMetric(currentMonth,'newFollowers') : 0;
    const totalPosts = md ? totalMetric(currentMonth,'posts') : 0;
    const bestReach = bestLoc(currentMonth,'reachNum');
    const bestEng = bestLoc(currentMonth,'engNum');
    const bestGrowth = bestLoc(currentMonth,'newFollowers');

    main.innerHTML = `
      ${monthHTML}
      <div class="section-label">Aggregate &mdash; All Locations</div>
      <div class="metrics-row metrics-row-4">
        <div class="metric-card">
          <div class="metric-icon" style="background:var(--pink-dim);color:var(--pink);">&#x1F4F1;</div>
          <div class="metric-label">Total Posts</div>
          <div class="metric-value">${md ? totalPosts : '&mdash;'}</div>
          <div class="metric-change neutral">5 LOCATIONS</div>
        </div>
        <div class="metric-card">
          <div class="metric-icon" style="background:rgba(68,138,255,0.1);color:var(--blue);">&#x1F441;</div>
          <div class="metric-label">Total Reach</div>
          <div class="metric-value">${md ? formatNum(totalReach) : '&mdash;'}</div>
          <div class="metric-change neutral">${monthLabel}</div>
        </div>
        <div class="metric-card">
          <div class="metric-icon" style="background:rgba(0,230,118,0.1);color:var(--green);">&#x1F4CA;</div>
          <div class="metric-label">Total Interactions</div>
          <div class="metric-value">${md ? formatNum(totalInt) : '&mdash;'}</div>
          <div class="metric-change neutral">${monthLabel}</div>
        </div>
        <div class="metric-card">
          <div class="metric-icon" style="background:rgba(255,145,0,0.1);color:var(--orange);">&#x2728;</div>
          <div class="metric-label">New Followers</div>
          <div class="metric-value">${md ? formatNum(totalFollowers) : '&mdash;'}</div>
          <div class="metric-change up">ALL LOCATIONS</div>
        </div>
      </div>

      <div class="section-label">By Location &mdash; ${monthLabel}</div>
      <div class="loc-grid">
        ${LOCATIONS.map(loc => {
          const d = md ? md[loc.id] : null;
          const isBestReach = loc.id === bestReach;
          const isBestEng = loc.id === bestEng;
          const isBestGrowth = loc.id === bestGrowth;
          return `<div class="loc-card">
            <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${loc.color};opacity:0.8;border-radius:var(--radius) var(--radius) 0 0;"></div>
            <div class="loc-card-header">
              <div class="loc-dot" style="background:${loc.color};"></div>
              <div class="loc-card-name">${loc.name}</div>
              <div class="loc-card-city">${loc.city}</div>
            </div>
            <div class="loc-stat">
              <div class="loc-stat-label">Posts</div>
              <div class="loc-stat-value">${d ? d.posts : '&mdash;'}</div>
            </div>
            <div class="loc-stat">
              <div class="loc-stat-label">Profile Reach</div>
              <div class="loc-stat-value ${isBestReach?'best':''}">${d ? d.reach : '&mdash;'}</div>
              ${isBestReach?'<div class="loc-stat-sub" style="color:var(--green);">&#9733; HIGHEST</div>':''}
            </div>
            <div class="loc-stat">
              <div class="loc-stat-label">Interactions</div>
              <div class="loc-stat-value">${d ? d.interactions : '&mdash;'}</div>
            </div>
            <div class="loc-stat">
              <div class="loc-stat-label">Engagement</div>
              <div class="loc-stat-value ${isBestEng?'best':''}">${d ? d.engagement : '&mdash;'}</div>
              ${isBestEng?'<div class="loc-stat-sub" style="color:var(--green);">&#9733; HIGHEST</div>':''}
            </div>
            <div class="loc-stat">
              <div class="loc-stat-label">New Followers</div>
              <div class="loc-stat-value ${isBestGrowth?'best':''}">${d ? d.newFollowers : '&mdash;'}</div>
              ${isBestGrowth?'<div class="loc-stat-sub" style="color:var(--green);">&#9733; HIGHEST</div>':''}
            </div>
          </div>`;
        }).join('')}
      </div>

      <div class="section-label">Engagement Rate Trends &mdash; Jan&ndash;Apr 2026</div>
      <div class="chart-card" style="margin-bottom:32px;">
        <div class="chart-header"><div class="chart-title">Engagement Rate Over Time (All Locations)</div></div>
        <div class="chart-container" style="height:320px;"><canvas id="engTrendChart"></canvas></div>
      </div>

      <div class="section-label">Comparison &mdash; ${monthLabel}</div>
      <div class="charts-grid">
        <div class="chart-card">
          <div class="chart-header"><div class="chart-title">Profile Reach by Location</div></div>
          <div class="chart-container"><canvas id="reachChart"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-header"><div class="chart-title">Engagement Rate</div></div>
          <div class="chart-container"><canvas id="engChart"></canvas></div>
        </div>
      </div>
    `;
    initOverviewCharts();

  } else if (currentTab === 'social') {
    main.innerHTML = `
      ${monthHTML}
      <div class="section-label">Location Performance &mdash; ${monthLabel}</div>
      <div class="table-card">
        <div class="chart-header"><div class="chart-title">All Locations Comparison</div></div>
        <div class="table-wrapper">
          <table>
            <thead><tr>
              <th>Location</th><th>City</th><th>Posts</th><th>Reach</th><th>Interactions</th><th>Engagement</th><th>New Followers</th>
            </tr></thead>
            <tbody>
              ${LOCATIONS.map(loc => {
                const d = md ? md[loc.id] : null;
                return `<tr>
                  <td style="color:var(--text);font-weight:600;"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${loc.color};margin-right:8px;"></span>${loc.name}</td>
                  <td>${loc.city}</td>
                  <td>${d ? d.posts : '&mdash;'}</td>
                  <td style="font-weight:600;color:var(--text);">${d ? d.reach : '&mdash;'}</td>
                  <td>${d ? d.interactions : '&mdash;'}</td>
                  <td style="font-weight:600;color:var(--text);">${d ? d.engagement : '&mdash;'}</td>
                  <td>${d ? d.newFollowers : '&mdash;'}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <div class="section-label">Follower Growth by Location</div>
      <div class="charts-grid">
        <div class="chart-card">
          <div class="chart-header"><div class="chart-title">New Followers</div></div>
          <div class="chart-container"><canvas id="followersChart"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-header"><div class="chart-title">Reach Distribution</div></div>
          <div class="chart-container"><canvas id="reachDoughnut"></canvas></div>
        </div>
      </div>
    `;
    initSocialCharts();

  } else if (currentTab === 'insights') {
    main.innerHTML = `
      ${monthHTML}
      <div class="section-label">Content Insights &mdash; ${monthLabel}</div>
      ${LOCATIONS.map(loc => {
        const d = md ? md[loc.id] : null;
        const ins = d ? d.insights : null;
        const hasData = ins && (ins.worked || ins.didntWork || ins.improvements || ins.audienceInsight);
        return `<div class="platform-card" style="margin-bottom:14px;">
          <div class="platform-header">
            <div class="platform-name">
              <div class="platform-dot" style="background:${loc.color};"></div>
              <span>${loc.name}</span>
            </div>
            <div class="platform-badge">${loc.city}</div>
          </div>
          ${hasData ? `
            <div class="insights-grid">
              <div>
                <div style="font-size:10px;color:var(--green);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:700;">What Worked</div>
                <div style="font-size:13px;color:var(--text-mid);line-height:1.6;">${ins.worked || '&mdash;'}</div>
              </div>
              <div>
                <div style="font-size:10px;color:var(--red);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:700;">What Didn't Work</div>
                <div style="font-size:13px;color:var(--text-mid);line-height:1.6;">${ins.didntWork || '&mdash;'}</div>
              </div>
              <div>
                <div style="font-size:10px;color:var(--pink);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:700;">Improvements</div>
                <div style="font-size:13px;color:var(--text-mid);line-height:1.6;">${ins.improvements || '&mdash;'}</div>
              </div>
              <div>
                <div style="font-size:10px;color:var(--blue);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:700;">Audience Insight</div>
                <div style="font-size:13px;color:var(--text-mid);line-height:1.6;">${ins.audienceInsight || '&mdash;'}</div>
              </div>
            </div>
          ` : `<div style="padding:8px 0;font-size:13px;color:var(--text-dim);line-height:1.7;">Insights pending &mdash; data to be added.</div>`}
        </div>`;
      }).join('')}
    `;

  } else if (currentTab === 'audience') {
    main.innerHTML = `
      ${monthHTML}
      <div class="section-label">Audience Deep Dive &mdash; ${monthLabel}</div>
      <div class="audience-grid">
        ${LOCATIONS.map(loc => {
          const d = md ? md[loc.id] : null;
          const aud = d ? d.audience : null;
          return `<div class="audience-card">
            <div style="height:3px;background:${loc.color};border-radius:4px;margin-bottom:16px;"></div>
            <div class="audience-card-name" style="color:${loc.color};">${loc.name}</div>
            <div class="audience-row"><span class="audience-row-label">Gender</span><span class="audience-row-value">${aud ? aud.gender : '&mdash;'}</span></div>
            <div class="audience-row"><span class="audience-row-label">Location</span><span class="audience-row-value">${aud ? aud.location : '&mdash;'}</span></div>
            <div class="audience-row"><span class="audience-row-label">Age</span><span class="audience-row-value">${aud ? aud.age : '&mdash;'}</span></div>
          </div>`;
        }).join('')}
      </div>

      <div class="section-label">Demographics Chart</div>
      <div class="charts-grid">
        <div class="chart-card">
          <div class="chart-header"><div class="chart-title">Engagement by Location</div></div>
          <div class="chart-container"><canvas id="audEngChart"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-header"><div class="chart-title">Followers Split</div></div>
          <div class="chart-container"><canvas id="audSplitChart"></canvas></div>
        </div>
      </div>
    `;
    initAudienceCharts();
  }
}

// === CHART SETUP ===
Chart.defaults.color = 'rgba(255,255,255,0.45)';
Chart.defaults.borderColor = 'rgba(255,255,255,0.06)';
Chart.defaults.font.family = "'Avenir','Avenir Next','Inter',sans-serif";
let charts = {};
function destroyChart(id) { if(charts[id]){charts[id].destroy();delete charts[id];} }
function getLocColors() { return LOCATIONS.map(l=>l.color); }
function getLocNames() { return LOCATIONS.map(l=>l.name); }
function getMetricArray(key) { const md=DATA[currentMonth]; return LOCATIONS.map(l=> md&&md[l.id] ? md[l.id][key] : 0); }

function initOverviewCharts() {
  destroyChart('reachChart'); destroyChart('engChart'); destroyChart('engTrendChart');

  // Engagement trend line chart
  const ctxTrend = document.getElementById('engTrendChart')?.getContext('2d');
  if(ctxTrend) charts['engTrendChart'] = new Chart(ctxTrend, {
    type:'line',
    data:{
      labels: TREND_LABELS,
      datasets: LOCATIONS.map(loc => ({
        label: loc.name,
        data: ENG_TREND[loc.id],
        borderColor: loc.color,
        backgroundColor: 'transparent',
        tension: 0.4,
        borderWidth: 2.5,
        pointRadius: 5,
        pointBackgroundColor: loc.color,
        pointBorderColor: '#0B0B12',
        pointBorderWidth: 2
      }))
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ position:'top', labels:{ usePointStyle:true, pointStyle:'circle', padding:20, font:{size:11} } } },
      scales:{
        y:{ grid:{color:'rgba(255,255,255,0.04)'}, ticks:{callback:v=>v+'%'} },
        x:{ grid:{display:false} }
      }
    }
  });

  const ctx1 = document.getElementById('reachChart')?.getContext('2d');
  if(ctx1) charts['reachChart'] = new Chart(ctx1, {
    type:'bar', data:{ labels:getLocNames(), datasets:[{ label:'Reach', data:getMetricArray('reachNum'), backgroundColor:getLocColors().map(c=>c+'CC'), borderRadius:10, barPercentage:0.6 }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{callback:v=>formatNum(v)}},x:{grid:{display:false}}} }
  });
  const ctx2 = document.getElementById('engChart')?.getContext('2d');
  if(ctx2) charts['engChart'] = new Chart(ctx2, {
    type:'doughnut', data:{ labels:getLocNames(), datasets:[{ data:getMetricArray('engNum'), backgroundColor:getLocColors(), borderWidth:0, spacing:4 }] },
    options:{ responsive:true, maintainAspectRatio:false, cutout:'70%', plugins:{legend:{position:'bottom',labels:{usePointStyle:true,pointStyle:'circle',padding:12,font:{size:10}}}} }
  });
}

function initSocialCharts() {
  destroyChart('followersChart'); destroyChart('reachDoughnut');
  const ctx1 = document.getElementById('followersChart')?.getContext('2d');
  if(ctx1) charts['followersChart'] = new Chart(ctx1, {
    type:'bar', data:{ labels:getLocNames(), datasets:[{ label:'New Followers', data:getMetricArray('newFollowers'), backgroundColor:getLocColors().map(c=>c+'CC'), borderRadius:10, barPercentage:0.6 }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{y:{grid:{color:'rgba(255,255,255,0.04)'}},x:{grid:{display:false}}} }
  });
  const ctx2 = document.getElementById('reachDoughnut')?.getContext('2d');
  if(ctx2) charts['reachDoughnut'] = new Chart(ctx2, {
    type:'doughnut', data:{ labels:getLocNames(), datasets:[{ data:getMetricArray('reachNum'), backgroundColor:getLocColors(), borderWidth:0, spacing:4 }] },
    options:{ responsive:true, maintainAspectRatio:false, cutout:'70%', plugins:{legend:{position:'bottom',labels:{usePointStyle:true,pointStyle:'circle',padding:12,font:{size:10}}}} }
  });
}

function initAudienceCharts() {
  destroyChart('audEngChart'); destroyChart('audSplitChart');
  const ctx1 = document.getElementById('audEngChart')?.getContext('2d');
  if(ctx1) charts['audEngChart'] = new Chart(ctx1, {
    type:'bar', data:{ labels:getLocNames(), datasets:[{ label:'Engagement %', data:getMetricArray('engNum'), backgroundColor:getLocColors().map(c=>c+'CC'), borderRadius:10, barPercentage:0.6 }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{callback:v=>v+'%'}},x:{grid:{display:false}}} }
  });
  const ctx2 = document.getElementById('audSplitChart')?.getContext('2d');
  if(ctx2) charts['audSplitChart'] = new Chart(ctx2, {
    type:'doughnut', data:{ labels:getLocNames(), datasets:[{ data:getMetricArray('newFollowers'), backgroundColor:getLocColors(), borderWidth:0, spacing:4 }] },
    options:{ responsive:true, maintainAspectRatio:false, cutout:'70%', plugins:{legend:{position:'bottom',labels:{usePointStyle:true,pointStyle:'circle',padding:12,font:{size:10}}}} }
  });
}

// === NAV ===
function switchTab(tab, btn) {
  document.querySelectorAll('.nav-tabs .nav-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  currentTab = tab;
  render();
}
function setMonth(month) {
  currentMonth = month;
  render();
}

// Init
render();
</script>
</body>
</html>
